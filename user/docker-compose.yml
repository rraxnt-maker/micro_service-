version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: user_postgres
    environment:
      POSTGRES_USER: useradmin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: userdb
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U useradmin"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - user-network

  app:
    build: .
    container_name: user_app
    ports:
      - "8069:8069"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: useradmin
      DB_PASSWORD: secretpassword
      DB_NAME: userdb
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - user-network

volumes:
  postgres_data:

networks:
  user-network:
    driver: bridge